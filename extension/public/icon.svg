<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5f5"/>
      <stop offset="50%" stop-color="#f0e0ff"/>
      <stop offset="100%" stop-color="#d4b8e8"/>
    </linearGradient>
    <linearGradient id="browser" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a0e8"/>
      <stop offset="100%" stop-color="#b07dd6"/>
    </linearGradient>
    <linearGradient id="catBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5eeff"/>
    </linearGradient>
    <radialGradient id="blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb0d0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb0d0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b5ea7"/>
      <stop offset="100%" stop-color="#a78bca"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#8b6aad" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)" filter="url(#softShadow)"/>

  <!-- Browser window -->
  <rect x="22" y="48" width="84" height="64" rx="8" ry="8" fill="url(#browser)" opacity="0.9"/>
  <!-- Browser title bar -->
  <rect x="22" y="48" width="84" height="16" rx="8" ry="8" fill="#a06cc8"/>
  <rect x="22" y="56" width="84" height="8" fill="#a06cc8"/>
  <!-- Browser dots -->
  <circle cx="34" cy="56" r="3" fill="#ff9ebc"/>
  <circle cx="44" cy="56" r="3" fill="#ffd59e"/>
  <circle cx="54" cy="56" r="3" fill="#a8e6a0"/>
  <!-- Browser URL bar -->
  <rect x="62" y="51" width="38" height="10" rx="5" fill="#c9a0e8" opacity="0.6"/>
  <circle cx="68" cy="56" r="2.5" fill="#e8d5f5" opacity="0.8"/>

  <!-- Cat body (peeking from browser) -->
  <ellipse cx="64" cy="52" rx="30" ry="24" fill="url(#catBody)"/>

  <!-- Cat ears -->
  <!-- Left ear -->
  <path d="M40 38 L34 16 L54 32 Z" fill="url(#catBody)" stroke="#e0d0f0" stroke-width="1"/>
  <path d="M42 36 L37 20 L52 32 Z" fill="#ffd0e8" opacity="0.6"/>
  <!-- Right ear -->
  <path d="M88 38 L94 16 L74 32 Z" fill="url(#catBody)" stroke="#e0d0f0" stroke-width="1"/>
  <path d="M86 36 L91 20 L76 32 Z" fill="#ffd0e8" opacity="0.6"/>

  <!-- Cat face -->
  <!-- Eyes -->
  <ellipse cx="52" cy="46" rx="6" ry="7" fill="url(#eyeGrad)"/>
  <ellipse cx="76" cy="46" rx="6" ry="7" fill="url(#eyeGrad)"/>
  <!-- Eye highlights -->
  <circle cx="54" cy="43" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="78" cy="43" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="50" cy="47" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="74" cy="47" r="1.2" fill="white" opacity="0.6"/>

  <!-- Nose -->
  <path d="M62 52 L64 55 L66 52 Z" fill="#ffaac8"/>

  <!-- Mouth -->
  <path d="M64 55 Q60 59 56 57" fill="none" stroke="#d4a0c0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M64 55 Q68 59 72 57" fill="none" stroke="#d4a0c0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="44" cy="53" rx="6" ry="4" fill="url(#blush)"/>
  <ellipse cx="84" cy="53" rx="6" ry="4" fill="url(#blush)"/>

  <!-- Whiskers -->
  <line x1="28" y1="50" x2="46" y2="52" stroke="#d4b8e8" stroke-width="1" opacity="0.5"/>
  <line x1="28" y1="55" x2="46" y2="55" stroke="#d4b8e8" stroke-width="1" opacity="0.5"/>
  <line x1="82" y1="52" x2="100" y2="50" stroke="#d4b8e8" stroke-width="1" opacity="0.5"/>
  <line x1="82" y1="55" x2="100" y2="55" stroke="#d4b8e8" stroke-width="1" opacity="0.5"/>

  <!-- Sparkle decorations -->
  <!-- Star 1 -->
  <path d="M18 24 L20 28 L24 28 L21 31 L22 35 L18 32 L14 35 L15 31 L12 28 L16 28 Z" fill="#ffd59e" opacity="0.8"/>
  <!-- Star 2 -->
  <path d="M106 20 L107.5 23 L111 23 L108.5 25 L109.5 28.5 L106 26 L102.5 28.5 L103.5 25 L101 23 L104.5 23 Z" fill="#c9b0f0" opacity="0.7"/>
  <!-- Star 3 -->
  <path d="M104 68 L105 70 L107 70 L105.5 71.5 L106 74 L104 72 L102 74 L102.5 71.5 L101 70 L103 70 Z" fill="#ffb0d0" opacity="0.6"/>
  <!-- Small sparkle dots -->
  <circle cx="14" cy="44" r="1.5" fill="#c9b0f0" opacity="0.6"/>
  <circle cx="112" cy="40" r="1.5" fill="#ffb0d0" opacity="0.5"/>
  <circle cx="20" cy="66" r="1" fill="#ffd59e" opacity="0.5"/>
</svg>
